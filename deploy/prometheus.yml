# Prometheus — infra/system metrics only (ADR-0005). Agent/LLM tracing and
# evaluation live in Opik, not here. Scrape targets are added as services
# expose /metrics in later phases.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Added in later phases as they expose /metrics:
  # - job_name: agent-runtime   (Module 3)
  # - job_name: sklearn-inference (Module 2)
  # - job_name: api             (Module 3)
