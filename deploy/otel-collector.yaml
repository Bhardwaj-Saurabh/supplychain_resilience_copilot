# OTEL Collector — emission layer (ADR-0005). Receives OTLP spans/metrics from
# agents, ML inference, and Airflow; exports traces to Opik and metrics to
# Prometheus. Exporters are placeholders until Opik is wired in Module 5.
receivers:
  otlp:
    protocols:
      grpc: { endpoint: 0.0.0.0:4317 }
      http: { endpoint: 0.0.0.0:4318 }

processors:
  batch: {}

exporters:
  debug:
    verbosity: normal
  # otlphttp/opik:        # wired in Module 5
  #   endpoint: http://opik:5173/api/v1/private/otel
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheus]
